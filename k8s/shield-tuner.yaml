apiVersion: batch/v1
kind: CronJob
metadata:
  name: shield-tuner
spec:
  schedule: "0 */6 * * *"  # every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: tuner
            image: duckai/vacuum-node:latest
            command: ["python", "-m", "vacuum_node.shield_tuner"]
            env:
            - name: METRICS_ENDPOINT
              value: "http://monitoring:9090/api/v1/query?query=avg_shield_latency"
          restartPolicy: OnFailure

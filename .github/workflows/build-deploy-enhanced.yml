---
name: Build, Deploy Kernel and Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential

      - name: Build kernel
        run: |
          gcc src/main.c -o kernel
          ls -la kernel

      - name: Package kernel
        run: |
          tar -czvf kernel.tar.gz kernel
          ls -la kernel.tar.gz

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            kernel
            kernel.tar.gz

  build-website:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare website files
        run: |
          mkdir -p _site
          cp index-optimized.html _site/index.html || cp index.html _site/index.html
          cp godel_shield_demo.html _site/ || true
          cp script.js _site/ || true
          cp lex-amoris.json _site/ || true
          
          # Copy assets if they exist
          if [ -d "assets" ]; then
            cp -r assets _site/
          fi
          
          # Copy README for documentation
          cp README.md _site/ || true
          cp SYNTHEIA_README.md _site/ || true
          
          # Create .nojekyll to bypass Jekyll processing
          touch _site/.nojekyll
          
          ls -la _site/

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-website
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-kernel
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-build
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: Kernel Release ${{ github.run_number }}
          body: |
            Automated kernel build and release.
            
            ## Changes
            - Built from commit: ${{ github.sha }}
            - Kernel compiled successfully
            - Package: kernel.tar.gz
            - Website deployed to GitHub Pages
            
            ## Manual Build Instructions
            ```sh
            gcc src/main.c -o kernel
            tar -czvf kernel.tar.gz kernel
            ```
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./kernel.tar.gz
          asset_name: kernel.tar.gz
          asset_content_type: application/gzip

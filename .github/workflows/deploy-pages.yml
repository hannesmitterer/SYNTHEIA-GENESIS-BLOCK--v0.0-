name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deployment directory
        run: |
          mkdir -p _site
          
      - name: Copy web assets to deployment directory
        run: |
          # Copy HTML files
          cp index.html _site/
          cp index-optimized.html _site/
          cp godel_shield_demo.html _site/
          
          # Copy JavaScript
          cp script.js _site/
          
          # Copy assets directory if it exists
          if [ -d "assets" ]; then
            cp -r assets _site/
          fi
          
          # Copy static files
          cp robots.txt _site/ 2>/dev/null || true
          cp sitemap.xml _site/ 2>/dev/null || true
          
          # Copy images
          cp *.png _site/ 2>/dev/null || true
          cp *.jpg _site/ 2>/dev/null || true
          cp *.svg _site/ 2>/dev/null || true
          
          # Create a documentation page for the vacuum_node module
          mkdir -p _site/docs
          
      - name: Generate documentation index
        run: |
          cat > _site/docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>SYNTHEIA Documentation</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      max-width: 1200px;
                      margin: 0 auto;
                      padding: 20px;
                      background: #0a0a0a;
                      color: #e0e0e0;
                  }
                  h1 { color: #00ffcc; }
                  h2 { color: #d4af37; margin-top: 2em; }
                  a { color: #00ffcc; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .card {
                      background: #1a1a1a;
                      border: 1px solid #333;
                      border-radius: 8px;
                      padding: 20px;
                      margin: 20px 0;
                  }
                  code {
                      background: #0f0f0f;
                      padding: 2px 6px;
                      border-radius: 3px;
                      font-family: 'Courier New', monospace;
                  }
                  pre {
                      background: #0f0f0f;
                      padding: 15px;
                      border-radius: 5px;
                      overflow-x: auto;
                  }
              </style>
          </head>
          <body>
              <h1>SYNTHEIA Genesis Block Documentation</h1>
              
              <div class="card">
                  <h2>🏠 Main Site</h2>
                  <p><a href="/">Return to SYNTHEIA Homepage</a></p>
              </div>
              
              <div class="card">
                  <h2>📚 Documentation</h2>
                  <ul>
                      <li><a href="vacuum-node.html">Vacuum Node Module (v2.1-v2.5)</a></li>
                      <li><a href="deployment.html">Deployment Guide</a></li>
                      <li><a href="quick-deploy.html">Quick Deploy Reference</a></li>
                  </ul>
              </div>
              
              <div class="card">
                  <h2>🎮 Demonstrations</h2>
                  <ul>
                      <li><a href="/godel_shield_demo.html">Gödel Shield Demo</a></li>
                      <li><a href="/index-optimized.html">Optimized Interface</a></li>
                  </ul>
              </div>
              
              <div class="card">
                  <h2>🔗 Resources</h2>
                  <ul>
                      <li><a href="https://github.com/hannesmitterer/SYNTHEIA-GENESIS-BLOCK--v0.0-">GitHub Repository</a></li>
                      <li><a href="https://github.com/hannesmitterer/SYNTHEIA-GENESIS-BLOCK--v0.0-/blob/main/README.md">README</a></li>
                  </ul>
              </div>
          </body>
          </html>
          EOF

      - name: Convert Markdown documentation to HTML
        run: |
          # Create simple HTML versions of key markdown files
          # This is a basic conversion - for production consider using a proper markdown processor
          
          # Vacuum Node README
          if [ -f "vacuum_node/README.md" ]; then
            cat > _site/docs/vacuum-node.html << 'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Vacuum Node Documentation - SYNTHEIA</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 20px;
                      background: #0a0a0a;
                      color: #e0e0e0;
                      line-height: 1.6;
                  }
                  h1, h2, h3 { color: #00ffcc; }
                  code {
                      background: #1a1a1a;
                      padding: 2px 6px;
                      border-radius: 3px;
                      font-family: 'Courier New', monospace;
                  }
                  pre {
                      background: #1a1a1a;
                      padding: 15px;
                      border-radius: 5px;
                      overflow-x: auto;
                  }
                  a { color: #00ffcc; }
                  table {
                      border-collapse: collapse;
                      width: 100%;
                      margin: 20px 0;
                  }
                  th, td {
                      border: 1px solid #333;
                      padding: 10px;
                      text-align: left;
                  }
                  th { background: #1a1a1a; }
              </style>
          </head>
          <body>
          HEADER
            echo '<pre>' >> _site/docs/vacuum-node.html
            cat vacuum_node/README.md >> _site/docs/vacuum-node.html
            echo '</pre>' >> _site/docs/vacuum-node.html
            echo '<p><a href="index.html">← Back to Documentation</a></p></body></html>' >> _site/docs/vacuum-node.html
          fi
          
          # Deployment Guide
          if [ -f "DEPLOYMENT_v2.1-v2.5.md" ]; then
            cat > _site/docs/deployment.html << 'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>Deployment Guide - SYNTHEIA</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 20px;
                      background: #0a0a0a;
                      color: #e0e0e0;
                      line-height: 1.6;
                  }
                  h1, h2, h3 { color: #00ffcc; }
                  code { background: #1a1a1a; padding: 2px 6px; border-radius: 3px; }
                  pre { background: #1a1a1a; padding: 15px; border-radius: 5px; overflow-x: auto; }
                  a { color: #00ffcc; }
              </style>
          </head>
          <body>
          HEADER
            echo '<pre>' >> _site/docs/deployment.html
            cat DEPLOYMENT_v2.1-v2.5.md >> _site/docs/deployment.html
            echo '</pre>' >> _site/docs/deployment.html
            echo '<p><a href="index.html">← Back to Documentation</a></p></body></html>' >> _site/docs/deployment.html
          fi
          
          # Quick Deploy
          if [ -f "QUICK_DEPLOY.md" ]; then
            cat > _site/docs/quick-deploy.html << 'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>Quick Deploy - SYNTHEIA</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 20px;
                      background: #0a0a0a;
                      color: #e0e0e0;
                      line-height: 1.6;
                  }
                  h1, h2, h3 { color: #00ffcc; }
                  code { background: #1a1a1a; padding: 2px 6px; border-radius: 3px; }
                  pre { background: #1a1a1a; padding: 15px; border-radius: 5px; overflow-x: auto; }
                  a { color: #00ffcc; }
              </style>
          </head>
          <body>
          HEADER
            echo '<pre>' >> _site/docs/quick-deploy.html
            cat QUICK_DEPLOY.md >> _site/docs/quick-deploy.html
            echo '</pre>' >> _site/docs/quick-deploy.html
            echo '<p><a href="index.html">← Back to Documentation</a></p></body></html>' >> _site/docs/quick-deploy.html
          fi

      - name: List deployment contents
        run: |
          echo "=== Deployment directory contents ==="
          ls -la _site/
          echo ""
          echo "=== Docs directory ==="
          ls -la _site/docs/ 2>/dev/null || echo "No docs directory"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
